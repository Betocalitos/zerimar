services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zerimar_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - zerimar_network
    depends_on:
      - db

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: zerimar_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - zerimar_network
    depends_on:
      - app

  # MariaDB Database (compatible with MySQL 5.7, supports ARM64)
  db:
    image: mariadb:10.6
    container_name: zerimar_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: zerimar
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: zerimar
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - zerimar_network

  # Node.js for frontend assets
  node:
    image: node:14-alpine
    container_name: zerimar_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev"
    networks:
      - zerimar_network

volumes:
  db_data:

networks:
  zerimar_network:
    driver: bridge
