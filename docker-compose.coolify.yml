# docker-compose.coolify.yml
# Coolify production deployment
#
# ALL environment variables are managed through Coolify's Environment UI.
# Coolify creates a .env file and injects it via env_file automatically.
# Do NOT define environment vars here — they won't be substituted correctly.
#
# Required env vars (set in Coolify UI):
#   APP_KEY, APP_URL, APP_ENV, APP_DEBUG
#   DB_CONNECTION, DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, DB_PASSWORD
#   MAIL_MAILER, MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD,
#   MAIL_ENCRYPTION, MAIL_FROM_ADDRESS, MAIL_FROM_NAME

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.production
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - app_storage:/var/www/storage/app/public
      - app_cache:/var/www/bootstrap/cache
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  app_storage:
    driver: local
  app_cache:
    driver: local